# Two-column lock screen.
#   Left 30%  : blurred wallpaper strip with clock + date + password.
#   Right 70% : sharp wallpaper (rendered into current.png by ~/Scripts/hyprlock.sh).
# Widgets sit in the left column: halign=center + x=-35% anchors their centre
# at 15% of the screen width (the middle of the 30% column).

background {
    monitor =
    path = ~/.config/hypr/wallpaper/current.png
    # The left-column blur is baked into the image; no extra blur here so the
    # right column stays sharp.
    blur_passes = 0
}

# Time — HH:MM, hours and minutes in wallpaper-derived colours (pango markup).
label {
    monitor =
    text = cmd[update:1000] ~/.config/hypr/hyprlock-time.sh
    font_size = 84
    font_family = CaskaydiaCoveNerdFont-Light
    shadow_passes = 4
    shadow_size = 7
    shadow_color = rgba(0, 0, 0, 1.0)
    shadow_boost = 1.6

    position = -35%, 11%
    halign = center
    valign = center
}

# Date — "%b, %A %d %Y" in the hour colour.
label {
    monitor =
    text = cmd[update:1000] ~/.config/hypr/hyprlock-date.sh
    font_size = 18
    font_family = CaskaydiaCoveNerdFont-Light
    shadow_passes = 4
    shadow_size = 6
    shadow_color = rgba(0, 0, 0, 1.0)
    shadow_boost = 1.6

    position = -35%, 1%
    halign = center
    valign = center
}

# Password — fixed width, 2px solid border.
input-field {
    monitor =
    size = 12%, 2.6%
    outline_thickness = 2
    inner_color = rgba(20, 20, 20, 0.55)
    outer_color = rgb(127, 200, 255)
    check_color = rgb(127, 200, 255)
    fail_color = rgb(255, 80, 80)
    font_color = rgb(235, 235, 235)
    placeholder_text = Password
    font_family = CaskaydiaCoveNerdFont-Light
    font_size = 10
    fade_on_empty = false
    rounding = -1

    position = -35%, -12%
    halign = center
    valign = center
}
