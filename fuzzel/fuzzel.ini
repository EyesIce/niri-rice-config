# Fuzzel launcher config
# Colors are RRGGBBAA hex (no leading #). Alpha < ff = transparent.

[main]
font=Inter:size=16
dpi-aware=no
# Icons scale to the row height; bigger line-height = bigger icons
line-height=32
prompt="❯ "
lines=10
width=35
horizontal-pad=20
vertical-pad=16
inner-pad=8

[border]
width=2
radius=10
# Rounded corners on the highlighted entry
selection-radius=10

[colors]
# Dark grey, semi-transparent background
background=2b2b2be6
text=e6e6e6ff
prompt=9a9a9aff
placeholder=6b6b6bff
input=e6e6e6ff
match=7fc8ffff
# Highlight selected app with the active-window border color
selection=7fc8ffff
# Dark text stays readable on the light-blue highlight
selection-text=16161eff
selection-match=0a3d62ff
border=7fc8ffff
