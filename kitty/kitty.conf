disable_ligatures no
enable_audio_bell no
shell zsh
cursor_shape block
url_style curly
remember_window_size no
window_padding_width 10
background_opacity 0.8
background_blur 1
scrollbar_handle_opacity 0
scrollbar_track_opacity 0
text_composition_strategy platform
shell_integration disabled


# BEGIN_KITTY_FONTS
font_family      JetBrainsMono NFM Thin
font_size        12
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS

# This helps the 'pills' touch each other perfectly
modify_font underline_position 5
modify_font underline_thickness 150%
modify_font baseline 0

# Mouse: copy to clipboard automatically on selection, paste with right-click.
# (Keyboard shortcuts are intentionally left untouched.)
copy_on_select yes
mouse_map right press ungrabbed paste_from_clipboard
